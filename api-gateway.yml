server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:

            - id: auth-swagger
              uri: http://auth-service:8081
              predicates:
                - Path=/auth/swagger-ui/**,/auth/v3/api-docs/**
              filters:
                - StripPrefix=1

            - id: user-swagger
              uri: http://user-service:8082
              predicates:
                - Path=/users/swagger-ui/**,/users/v3/api-docs/**
              filters:
                - StripPrefix=1

            - id: skill-swagger
              uri: http://skill-service:8084
              predicates:
                - Path=/skills/swagger-ui/**,/skills/v3/api-docs/**
              filters:
                - StripPrefix=1

            - id: mentor-swagger
              uri: http://mentor-service:8083
              predicates:
                - Path=/mentors/swagger-ui/**,/mentors/v3/api-docs/**
              filters:
                - StripPrefix=1

            - id: session-swagger
              uri: http://session-service:8085
              predicates:
                - Path=/sessions/swagger-ui/**,/sessions/v3/api-docs/**
              filters:
                - StripPrefix=1

            - id: review-swagger
              uri: http://review-service:8086
              predicates:
                - Path=/reviews/swagger-ui/**,/reviews/v3/api-docs/**
              filters:
                - StripPrefix=1

            - id: notification-swagger
              uri: http://notification-service:8088
              predicates:
                - Path=/notifications/swagger-ui/**,/notifications/v3/api-docs/**
              filters:
                - StripPrefix=1


            - id: auth-service
              uri: http://auth-service:8081
              predicates:
                - Path=/auth/**

            - id: user-service
              uri: http://user-service:8082
              predicates:
                - Path=/users/**

            - id: skill-service
              uri: http://skill-service:8084
              predicates:
                - Path=/skills/**

            - id: mentor-service
              uri: http://mentor-service:8083
              predicates:
                - Path=/mentors/**

            - id: session-service
              uri: http://session-service:8085
              predicates:
                - Path=/sessions/**

            - id: review-service
              uri: http://review-service:8086
              predicates:
                - Path=/reviews/**

            - id: notification-service
              uri: http://notification-service:8088
              predicates:
                - Path=/notifications/**

            - id: group-service
              uri: http://group-service:8089
              predicates:
                - Path=/groups/**

          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"

jwt:
  secret: ${JWT_SECRET}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Auth Service API
        url: /auth/v3/api-docs
      - name: User Service API
        url: /users/v3/api-docs
      - name: Skill Service API
        url: /skills/v3/api-docs
      - name: Mentor Service API
        url: /mentors/v3/api-docs
      - name: Session Service API
        url: /sessions/v3/api-docs
      - name: Review Service API
        url: /reviews/v3/api-docs

  api-docs:
    enabled: true

logging:
  level:
    org.springframework.cloud.gateway: TRACE

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
